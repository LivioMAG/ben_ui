<!doctype html><html lang='de'><head><meta charset='UTF-8'><title>Stundenerfassung</title><link rel='stylesheet' href='assets/css/styles.css'></head>
<body><header><nav id='main-nav'></nav><div><span id='current-user'></span> <button id='logout-btn'>Logout</button></div></header>
<main><h1>Stundenerfassung</h1><p id='page-message' class='msg'></p>
<form id='time-form'><label>Mitarbeiter <select id='employee_id' name='employee_id' required></select></label><label>Projekt <select id='project_id' name='project_id' required></select></label><label>Datum <input name='entry_date' type='date' required></label><label>Stunden <input name='hours' type='number' step='0.25' required></label><label>Startzeit <input name='start_time' type='time'></label><label>Endzeit <input name='end_time' type='time'></label><label>Pause (Min) <input name='break_minutes' type='number'></label><label>Notiz <textarea name='note'></textarea></label><label>Status <select name='status'><option>erfasst</option><option>geprüft</option><option>freigegeben</option></select></label><button>Speichern</button></form>
<table id='time-table'><thead><tr><th>Datum</th><th>Mitarbeiter</th><th>Projekt</th><th>Stunden</th><th>Status</th></tr></thead><tbody></tbody></table>
</main><script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script><script type='module' src='assets/js/time-tracking.js'></script></body></html>
