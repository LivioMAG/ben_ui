<!doctype html><html lang='de'><head><meta charset='UTF-8'><title>Mitarbeiter</title><link rel='stylesheet' href='/assets/css/styles.css'></head>
<body><header><nav id='main-nav'></nav><div><span id='current-user'></span> <button id='logout-btn'>Logout</button></div></header>
<main><h1>Mitarbeiter</h1><p id='page-message' class='msg'></p>
<section><h3>Mitarbeiterprofil bearbeiten (Auth-User bereits vorhanden)</h3>
<form id='employee-form'><label>Auth User ID <input name='id' placeholder='UUID' required></label><label>Vorname <input name='first_name'></label><label>Nachname <input name='last_name'></label><label>E-Mail <input name='email' type='email' required></label><label>Telefon <input name='phone'></label><label>Rolle <select name='role'><option value='admin'>admin</option><option value='mitarbeiter'>mitarbeiter</option></select></label><label>Eintrittsdatum <input name='entry_date' type='date'></label><label>Notizen <textarea name='notes'></textarea></label><button>Speichern</button></form></section>
<section><h3>Mitarbeiterdokumente</h3><form id='employee-doc-form'><label>Mitarbeiter <select id='doc_employee_id' name='employee_id' required></select></label><label>Dokumenttitel <input name='title' required></label><label>Dokumenttyp <input name='document_type' required></label><label>Ablaufdatum <input name='expires_at' type='date'></label><label>Datei <input name='file' type='file' required></label><label>Notiz <textarea name='note'></textarea></label><button>Dokument hochladen</button></form>
<table id='employee-docs-table'><thead><tr><th>Titel</th><th>Typ</th><th>Mitarbeiter</th><th>Ablauf</th><th>Pfad</th></tr></thead><tbody></tbody></table></section>
<section><table id='employees-table'><thead><tr><th>Name</th><th>E-Mail</th><th>Rolle</th><th>Telefon</th><th>Aktion</th></tr></thead><tbody></tbody></table></section>
</main><script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script><script type='module' src='/assets/js/employees.js'></script></body></html>
