<!doctype html>
<html lang='de'>
<head><meta charset='UTF-8'><title>Login</title><link rel='stylesheet' href='/assets/css/styles.css'></head>
<body>
<main>
  <h1>Login</h1>
  <div class='auth-grid'>
    <section>
      <h3>E-Mail + Passwort</h3>
      <form id='login-form'>
        <label>E-Mail <input type='email' name='email' required></label>
        <label>Passwort <input type='password' name='password' required></label>
        <button type='submit'>Einloggen</button>
      </form>
    </section>
    <section>
      <h3>Passwort zurücksetzen</h3>
      <label>E-Mail <input id='reset-email' type='email'></label>
      <button id='reset-password-btn' type='button'>Reset-Link senden</button>
    </section>
    <section>
      <h3>OTP per E-Mail</h3>
      <label>E-Mail <input id='otp-email' type='email'></label>
      <button id='send-otp-btn' type='button'>OTP senden</button>
      <form id='otp-verify-form'>
        <label>Code <input id='otp-token' required></label>
        <button type='submit'>OTP prüfen</button>
      </form>
    </section>
  </div>
  <p id='auth-message' class='msg'></p>
</main>
<script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script>
<script type='module'>import { initLoginPage } from '/assets/js/auth.js'; initLoginPage();</script>
</body>
</html>
