<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NebulaRTC Main-Screen für WebRTC-Räume, Sessions und Signaling-Status." />
    <title>NebulaRTC · Main Screen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="kampagnen.css" />
  </head>
  <body>
    <main class="dashboard">
      <header class="topbar card">
        <div>
          <p class="eyebrow">NebulaRTC Platform</p>
          <h1>Main Screen · WebRTC Control</h1>
          <p id="userInfo" class="subline">Lade Benutzer…</p>
        </div>
        <div class="header-actions">
          <button id="refreshBtn" class="ghost" type="button">Refresh</button>
          <button id="logoutBtn" type="button">Logout</button>
        </div>
      </header>

      <section class="stats-grid">
        <article class="card stat-card"><p>Aktive Räume</p><h2 id="statRooms">0</h2></article>
        <article class="card stat-card"><p>Online Teilnehmer</p><h2 id="statParticipants">0</h2></article>
        <article class="card stat-card"><p>Signaling Events (24h)</p><h2 id="statSignals">0</h2></article>
        <article class="card stat-card"><p>Eigene Sessions</p><h2 id="statSessions">0</h2></article>
      </section>

      <section class="card create-section">
        <h2>Neuen WebRTC-Raum anlegen</h2>
        <form id="roomForm" class="campaign-form">
          <label>
            Raumname
            <input id="roomName" name="roomName" type="text" required minlength="2" placeholder="Design-Review" />
          </label>

          <label>
            Modus
            <select id="roomMode" name="roomMode" required>
              <option value="mesh">Mesh</option>
              <option value="sfu">SFU</option>
            </select>
          </label>

          <label>
            Maximale Teilnehmer
            <input id="maxParticipants" name="maxParticipants" type="number" min="2" max="50" value="8" required />
          </label>

          <button type="submit">Raum erstellen</button>
        </form>
        <p id="status" class="status">Bereit.</p>
      </section>

      <section class="card">
        <h2>Räume</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Modus</th>
                <th>Max</th>
                <th>Status</th>
                <th>Erstellt am</th>
              </tr>
            </thead>
            <tbody id="roomTableBody">
              <tr><td colspan="5">Noch keine Räume vorhanden.</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="kampagnen.js"></script>
  </body>
</html>
