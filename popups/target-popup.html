<section id="targetModal" class="target-modal hidden">
  <div class="target-modal-window">
    <div class="target-modal-header">
      <h3 id="targetModalTitle">Zielgruppendefinitionierung</h3>
      <button id="closeTargetModalBtn" class="target-close-btn">✕ Schließen</button>
    </div>

    <div class="target-modal-body">
      <aside class="target-timeline-panel">
        <h4>Fortschritt</h4>
        <div id="targetTimeline" class="target-timeline"></div>
      </aside>

      <section class="target-chat-panel">
        <div id="targetChatMessages" class="chat-messages"></div>
        <form id="targetChatForm" class="chat-input-row">
          <input id="targetChatInput" type="text" placeholder="Nachricht schreiben ..." autocomplete="off" required />
          <button type="submit" class="target-send-btn">Senden</button>
        </form>
      </section>
    </div>
  </div>
</section>
