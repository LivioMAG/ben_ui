<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="drawer">
        <div class="brand">
          <div class="brand-dot"></div>
          <div>
            <p class="brand-kicker">Content Control</p>
            <h1>Dashboard</h1>
          </div>
        </div>

        <nav class="drawer-nav" id="drawerNav"></nav>

        <div class="drawer-footer">
          <p>Apple-inspired UI · JSON first</p>
        </div>
      </aside>

      <main class="main-panel">
        <header class="panel-header">
          <div>
            <p class="eyebrow">Editor</p>
            <h2 id="sectionTitle">Lädt...</h2>
          </div>
          <div class="header-actions">
            <button id="reloadBtn" class="btn btn-ghost">Neu laden</button>
            <button id="saveBtn" class="btn btn-primary">Speichern</button>
          </div>
        </header>

        <section class="status-row">
          <p id="statusText">Initialisiere Datenquelle...</p>
        </section>

        <section id="editorRoot" class="editor-root"></section>
      </main>
    </div>

    <template id="fieldTemplate">
      <label class="field-row">
        <span class="field-key"></span>
        <span class="field-control"></span>
      </label>
    </template>

    <script src="app.js" type="module"></script>
  </body>
</html>
