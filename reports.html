<!doctype html><html lang='de'><head><meta charset='UTF-8'><title>Rapporte</title><link rel='stylesheet' href='assets/css/styles.css'></head>
<body><header><nav id='main-nav'></nav><div><span id='current-user'></span> <button id='logout-btn'>Logout</button></div></header>
<main><h1>Wochenrapporte</h1><p id='page-message' class='msg'></p>
<form id='report-form'><label>Mitarbeiter <select id='report_employee_id' name='employee_id' required></select></label><label>Projekt <select id='report_project_id' name='project_id' required></select></label><label>Datum <input type='date' name='report_date' required></label><label>Kalenderwoche <input name='calendar_week' type='number' required></label><label>Arbeiten <textarea name='work_description' required></textarea></label><label>Material <textarea name='used_material'></textarea></label><label>Vorkommnisse <textarea name='special_incidents'></textarea></label><label>Stunden <input type='number' step='0.25' name='hours'></label><label>Fotos <input type='file' name='photos' multiple></label><label>Status <select name='status'><option>entwurf</option><option>eingereicht</option><option>freigegeben</option></select></label><button>Rapport speichern</button></form>
<table id='reports-table'><thead><tr><th>Datum</th><th>Mitarbeiter</th><th>Projekt</th><th>Status</th><th>Stunden</th></tr></thead><tbody></tbody></table>
</main><script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script><script type='module' src='assets/js/reports.js'></script></body></html>
